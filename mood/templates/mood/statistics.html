{% extends 'mood/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm border-0">
            <div class="card-header bg-info text-white text-center">
                <h4 class="mb-0">📊 我的心情統計圖表</h4>
            </div>
            <div class="card-body bg-white d-flex justify-content-center">
                <div style="width: 60%; max-width: 400px;">
                    <canvas id="moodChart"></canvas>
                </div>
            </div>
            <div class="card-footer bg-light text-center">
                <a href="{% url 'index' %}" class="btn btn-outline-primary">🔙 返回歷史紀錄</a>
            </div>
        </div>
    </div>
</div>

{{ labels|json_script:"labels-data" }}
{{ data|json_script:"data-data" }}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const labels = JSON.parse(document.getElementById('labels-data').textContent);
    const data = JSON.parse(document.getElementById('data-data').textContent);
    
    // 畫出圓餅圖
    const ctx = document.getElementById('moodChart').getContext('2d');
    new Chart(ctx, {
        type: 'doughnut', 
        data: {
            labels: labels,
            datasets: [{
                label: '心情次數',
                data: data,
                backgroundColor: [
                    'rgba(255, 206, 86, 0.7)',  // 開心 (黃)
                    'rgba(201, 203, 207, 0.7)', // 平靜 (灰)
                    'rgba(153, 102, 255, 0.7)', // 焦慮 (紫)
                    'rgba(54, 162, 235, 0.7)',  // 低落 (藍)
                    'rgba(255, 99, 132, 0.7)'   // 生氣 (紅)
                ],
                borderWidth: 1
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { position: 'bottom' }
            }
        }
    });
</script>
{% endblock content %}
