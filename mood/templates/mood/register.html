{% extends 'mood/base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">📝 註冊新帳號</h4>
            </div>
            <div class="card-body">
                <form method="POST" action="{% url 'register' %}">
                    {% csrf_token %}
                    {% for field in form %}
                        <div class="mb-3">
                            <label class="form-label fw-bold">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}
                                <div class="form-text"><small>{{ field.help_text }}</small></div>
                            {% endif %}
                            {% for error in field.errors %}
                                <div class="text-danger small mt-1">⚠️ {{ error }}</div>
                            {% endfor %}
                        </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100 mt-3">立即註冊</button>
                </form>
                <div class="text-center mt-3">
                    <small>已經有帳號了嗎？ <a href="{% url 'login' %}">點此登入</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
