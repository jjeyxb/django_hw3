version: '3.8'

services:
  # 1. 資料庫容器
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mood_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # 2. Django 應用程式容器
  app:
    build: .
    # 啟動時先自動做資料庫遷移，再把伺服器跑起來
    command: bash -c "python manage.py makemigrations && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    depends_on:
      - db

  # 3. Nginx 伺服器容器
  nginx:
    image: nginx:latest
    ports:
      - "80:80"  # 對外開放標準的網頁 80 port
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

volumes:
  mysql_data: